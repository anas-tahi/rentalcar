version: "3.9"

services:
  # ── Auth Service ──────────────────────────────────────────────
  auth-service:
    build: ./backend/auth-service
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      NODE_ENV: ${NODE_ENV:-development}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Car Service ───────────────────────────────────────────────
  car-service:
    build: ./backend/car-service
    container_name: car-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: ${NODE_ENV:-development}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Booking Service ───────────────────────────────────────────
  booking-service:
    build: ./backend/booking-service
    container_name: booking-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: ${NODE_ENV:-development}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Payment Service ───────────────────────────────────────────
  payment-service:
    build: ./backend/payment-service
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NODE_ENV: ${NODE_ENV:-development}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway ───────────────────────────────────────────────
  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE: http://auth-service:3001
      CAR_SERVICE: http://car-service:3002
      BOOKING_SERVICE: http://booking-service:3003
      PAYMENT_SERVICE: http://payment-service:3004
      CLIENT_URL: http://localhost:3000
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      auth-service:
        condition: service_healthy
      car-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5000
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - api-gateway
